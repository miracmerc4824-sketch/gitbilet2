server {
    listen 80;
    listen [::]:80;
    server_name 10.159.109.35 _;   # catch-all: IP + any hostname

    root  /usr/share/nginx/html;
    index index.html;

    # ── CORS pre-flight (ağdan gelen cihazlar için) ───────────────
    add_header 'Access-Control-Allow-Origin'  '*'           always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    # ── Static Frontend ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── React seats-3d app ────────────────────────────────────────
    location /seats-3d/ {
        alias /usr/share/nginx/html/seats-3d/;
        try_files $uri $uri/ /seats-3d/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── API Gateway proxy ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api-gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        # CORS for proxied calls
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ── WebSocket pass-through (digital-twin) ────────────────────
    location /ws/ {
        proxy_pass         http://digital-twin:8007;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
}
