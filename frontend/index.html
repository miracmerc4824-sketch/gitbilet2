<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BiletBudur — Türkiye'nin en akıllı biletleme platformu. Yerçekimine meydan oku." />
  <title>BiletBudur — Giriş</title>
  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    /* ── Login Page Specific ── */
    .login-scene {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background aurora layers */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .aurora__layer {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
      animation: auroraFade 0.8s ease 0.2s forwards;
    }

    @keyframes auroraFade {
      to { opacity: 1; }
    }

    .aurora__layer:nth-child(1) {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: auroraFade 0.8s ease 0.2s forwards, blobFloat 14s ease-in-out 1s infinite;
    }

    .aurora__layer:nth-child(2) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation: auroraFade 0.8s ease 0.4s forwards, blobFloat 11s ease-in-out 2s infinite reverse;
    }

    .aurora__layer:nth-child(3) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(79,70,229,0.12) 0%, transparent 70%);
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      animation: auroraFade 0.8s ease 0.6s forwards, blobFloat 16s ease-in-out 3s infinite;
    }

    /* Blob canvas */
    #blob-canvas {
      position: fixed;
      inset: 0;
      z-index: var(--z-blob);
      pointer-events: none;
    }

    /* Geometric floating shapes */
    .geo-container {
      position: fixed;
      inset: 0;
      z-index: calc(var(--z-blob) - 1);
      pointer-events: none;
      overflow: hidden;
    }

    .geo-item {
      position: absolute;
      opacity: 0.06;
    }

    .geo-item--ring {
      border: 1.5px solid var(--blob-purple-light);
      border-radius: 50%;
    }

    /* Login panel */
    .login-panel {
      position: relative;
      z-index: var(--z-form);
      width: 100%;
      max-width: 420px;
      padding: var(--space-10) var(--space-8);
      animation: panelSlideIn 0.8s var(--ease-out-quint) 0.3s both;
      background: rgba(6, 9, 15, 0.7);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-2xl);
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.1),
        0 8px 40px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .login-panel::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: calc(var(--radius-2xl) + 1px);
      background: linear-gradient(135deg, rgba(124,58,237,0.3), transparent 40%, rgba(249,115,22,0.2));
      z-index: -1;
      pointer-events: none;
    }

    /* Logo area */
    .login-logo {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-logo__icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-4);
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, var(--blob-purple), var(--blob-orange));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 30px rgba(124,58,237,0.4);
      animation: idleHover 4s ease-in-out infinite;
    }

    .login-logo__title {
      font-size: var(--text-3xl);
      font-weight: var(--weight-black);
      letter-spacing: -0.04em;
      animation: logoReveal 1s var(--ease-out-quint) 0.5s both;
    }

    .login-logo__subtitle {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      margin-top: var(--space-1);
    }

    /* Tabs */
    .login-tabs {
      display: flex;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 3px;
      margin-bottom: var(--space-6);
      position: relative;
    }

    .login-tab {
      flex: 1;
      padding: var(--space-2) var(--space-4);
      border-radius: calc(var(--radius-lg) - 3px);
      text-align: center;
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      cursor: pointer;
      color: var(--text-tertiary);
      transition: all var(--duration-normal) var(--ease-out-quint);
      position: relative;
      z-index: 1;
    }

    .login-tab.active {
      color: var(--text-primary);
      background: rgba(124,58,237,0.2);
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      color: var(--text-tertiary);
      font-size: var(--text-xs);
      margin: var(--space-2) 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    /* Social login */
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      color: var(--text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out-quint);
      width: 100%;
    }

    .social-btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: var(--glass-border-hover);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* Error hint */
    .login-error-hint {
      display: none;
      color: var(--accent-danger);
      font-size: var(--text-xs);
      text-align: center;
      padding: var(--space-2) var(--space-3);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-md);
    }

    /* Demo hint */
    .demo-hint {
      text-align: center;
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: var(--space-4);
      padding: var(--space-3);
      background: rgba(124,58,237,0.05);
      border: 1px solid rgba(124,58,237,0.1);
      border-radius: var(--radius-md);
    }

    .demo-hint strong {
      color: var(--blob-purple-light);
    }

    /* Star field */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
    }
  </style>
</head>
<body>
  <!-- Background Aurora -->
  <div class="aurora">
    <div class="aurora__layer"></div>
    <div class="aurora__layer"></div>
    <div class="aurora__layer"></div>
  </div>

  <!-- Star field -->
  <div class="stars" id="stars"></div>

  <!-- Geometric Shapes -->
  <div class="geo-container">
    <div class="geo-item geo-item--ring" style="width:400px;height:400px;top:-100px;right:-100px;animation:geoRotate 25s linear infinite;"></div>
    <div class="geo-item geo-item--ring" style="width:250px;height:250px;bottom:-80px;left:-80px;animation:geoCounterRotate 20s linear infinite;border-color:var(--blob-orange);"></div>
    <div class="geo-item geo-item--ring" style="width:120px;height:120px;top:20%;left:10%;animation:geoFloat 8s ease-in-out infinite;border-color:var(--blob-yellow);"></div>
    <div class="geo-item geo-item--ring" style="width:80px;height:80px;bottom:25%;right:12%;animation:geoFloat 6s ease-in-out 2s infinite;"></div>
  </div>

  <!-- Blob Canvas -->
  <canvas id="blob-canvas"></canvas>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Login Scene -->
  <div class="login-scene">
    <div class="login-panel" role="main" aria-label="Giriş Paneli">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo__icon" aria-hidden="true">⚡</div>
        <h1 class="login-logo__title text-gradient-purple">BiletBudur</h1>
        <p class="login-logo__subtitle">Yerçekimine meydan oku &bull; Biletini uçur</p>
      </div>

      <!-- Tabs -->
      <div class="login-tabs" role="tablist">
        <div class="login-tab active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">Giriş Yap</div>
        <div class="login-tab" id="tab-register" role="tab" aria-selected="false" onclick="switchTab('register')">Kayıt Ol</div>
      </div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="login-form">
          <!-- Email -->
          <div class="input-group">
            <label class="input-label" for="login-email">E-posta</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input
                class="input-field"
                type="email"
                id="login-email"
                placeholder="ornek@email.com"
                autocomplete="email"
                spellcheck="false"
              />
            </div>
          </div>

          <!-- Password -->
          <div class="input-group">
            <label class="input-label" for="login-password">Şifre</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                class="input-field"
                type="password"
                id="login-password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
          </div>

          <!-- Error hint -->
          <div class="login-error-hint" id="login-error" role="alert"></div>

          <!-- Forgot password -->
          <div style="text-align:right; margin-top:-var(--space-2)">
            <a href="#" style="font-size:var(--text-xs); color:var(--blob-purple-light); transition:opacity 0.2s" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
              Şifremi unuttum
            </a>
          </div>

          <!-- Login button -->
          <button
            class="btn btn--primary btn--lg btn--full"
            id="login-btn"
            type="button"
            aria-label="Giriş yap"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Giriş Yap
          </button>

          <!-- Divider -->
          <div class="login-divider">veya</div>

          <!-- Social Logins -->
          <button class="social-btn" type="button" id="google-btn" aria-label="Google ile giriş">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google ile devam et
          </button>
        </div>

        <!-- Demo credentials -->
        <div class="demo-hint">
          🎭 Demo: <strong>dev@antigravity.app</strong> / <strong>123456</strong>
        </div>
      </div>

      <!-- Register Form -->
      <div id="form-register" style="display:none">
        <div class="login-form">
          <div class="input-group">
            <label class="input-label" for="reg-name">Ad Soyad</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input class="input-field" type="text" id="reg-name" placeholder="Ad Soyad" autocomplete="name" />
            </div>
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-email">E-posta</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input class="input-field" type="email" id="reg-email" placeholder="ornek@email.com" autocomplete="email" />
            </div>
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-password">Şifre</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input class="input-field" type="password" id="reg-password" placeholder="Min. 6 karakter" autocomplete="new-password" />
            </div>
          </div>

          <div class="login-error-hint" id="reg-error" role="alert"></div>

          <button class="btn btn--primary btn--lg btn--full" id="reg-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/>
              <line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
            Hesap Oluştur
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/blob-engine.js"></script>
  <script src="js/mood-engine.js"></script>
  <script src="js/weather-engine.js"></script>
  <script src="js/ai-chat.js"></script>
  <script>
    /* ── Star Field Generator ── */
    function generateStars() {
      const container = document.getElementById('stars');
      const count = 80;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        star.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          opacity: ${Math.random() * 0.4 + 0.1};
          animation: starTwinkle ${2 + Math.random() * 4}s ease-in-out ${Math.random() * 3}s infinite;
        `;
        container.appendChild(star);
      }
    }

    /* ── Canvas sizing ── */
    function resizeCanvas() {
      const canvas = document.getElementById('blob-canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    /* ── Tab switching ── */
    function switchTab(tab) {
      const tabLogin    = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const formLogin   = document.getElementById('form-login');
      const formReg     = document.getElementById('form-register');

      if (tab === 'login') {
        tabLogin.classList.add('active');    tabLogin.setAttribute('aria-selected','true');
        tabRegister.classList.remove('active'); tabRegister.setAttribute('aria-selected','false');
        formLogin.style.display = 'block';
        formReg.style.display   = 'none';
      } else {
        tabRegister.classList.add('active');    tabRegister.setAttribute('aria-selected','true');
        tabLogin.classList.remove('active'); tabLogin.setAttribute('aria-selected','false');
        formReg.style.display   = 'block';
        formLogin.style.display = 'none';
      }
    }

    /* ── Initialize ── */
    window.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (AG.isLoggedIn()) {
        window.location.href = 'dashboard.html';
        return;
      }

      generateStars();
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // Init Blob Engine
      const engine = new BlobEngine('blob-canvas');

      // Init Mood Engine
      const mood = new MoodEngine(engine, {
        emailInput:   document.getElementById('login-email'),
        passwordInput: document.getElementById('login-password'),
        loginBtn:     document.getElementById('login-btn'),
      });

      // Override error display
      document.querySelector('.login-error-hint')?.setAttribute('id', 'login-error');

      // Login button
      document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value.trim();
        const pass  = document.getElementById('login-password').value;
        const btn   = document.getElementById('login-btn');
        const err   = document.getElementById('login-error');

        if (!email || !pass) {
          mood.transition('PANIC');
          err.textContent = '! Tüm alanları doldurun';
          err.style.display = 'block';
          return;
        }

        // Loading
        btn.innerHTML = '<div class="btn__spinner"></div> Giriş yapılıyor...';
        btn.disabled = true;

        const result = await AG.mockLogin(email, pass);

        if (result.success) {
          mood.transition('VICTORY');
          err.style.display = 'none';
        } else {
          btn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Giriş Yap
          `;
          btn.disabled = false;
          mood.transition('PANIC');
          err.textContent = '! ' + result.message;
          err.style.display = 'block';
        }
      });

      // Register button
      document.getElementById('reg-btn').addEventListener('click', async () => {
        const name  = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const pass  = document.getElementById('reg-password').value;
        const btn   = document.getElementById('reg-btn');
        const err   = document.getElementById('reg-error');

        if (!name || !email || !pass) {
          err.textContent = '! Tüm alanları doldurun';
          err.style.display = 'block';
          return;
        }

        if (pass.length < 6) {
          err.textContent = '! Şifre en az 6 karakter olmalı';
          err.style.display = 'block';
          return;
        }

        btn.innerHTML = '<div class="btn__spinner"></div> Oluşturuluyor...';
        btn.disabled = true;

        const result = await AG.mockRegister({ name, email, password: pass });

        if (result.success) {
          engine.triggerVictory(() => {
            window.location.href = 'dashboard.html';
          });
        } else {
          btn.textContent = 'Hesap Oluştur';
          btn.disabled = false;
          err.textContent = '! ' + result.message;
          err.style.display = 'block';
        }
      });

      // Google mock
      document.getElementById('google-btn').addEventListener('click', async () => {
        const btn = document.getElementById('google-btn');
        btn.innerHTML = '<div class="btn__spinner" style="border-top-color:#4285F4"></div> Yönlendiriliyor...';
        btn.disabled = true;
        await AG.delay(800);
        // Mock Google login
        await AG.mockLogin('dev@antigravity.app', '123456');
        engine.triggerVictory(() => {
          window.location.href = 'dashboard.html';
        });
      });

      // Enter key support
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const activeTab = document.getElementById('tab-login').classList.contains('active');
          if (activeTab) document.getElementById('login-btn').click();
          else document.getElementById('reg-btn').click();
        }
      });
    });
  </script>
</body>
</html>
